<!DOCTYPE html>
<html>
<head>
  <title>Käyttäjä</title>
</head>

<body>

<h1>Käyttäjä: {{ user[1] }}</h1>

<p>Arvosteluja yhteensä: {{ review_count }}</p>

<h2>Lisätyt arvostelut</h2>

{% if reviews %}

  {% for r in reviews %}

    <div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">

      <h3>{{ r[1] }}</h3>

      <p>{{ r[2] }}</p>

      <p>
        <b>Genret:</b> {{ r[3] if r[3] else "Ei genrejä" }}
      </p>

      <p>
        <a href="/edit/{{ r[0] }}">Muokkaa</a>
      </p>

    </div>

  {% endfor %}

{% else %}
  <p>Ei arvosteluja.</p>
{% endif %}

<p>
  <a href="/">Takaisin etusivulle</a>
</p>

</body>
</html>
