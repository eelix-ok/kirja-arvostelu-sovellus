{% extends "layout.html" %}

{% block title %}Uusi arvostelu{% endblock %}

{% block content %}

<h1>Lisää uusi kirja-arvostelu</h1>

{% for message in get_flashed_messages() %}
  <p class="info">{{ message }}</p>
{% endfor %}

<form method="POST" action="/create_review">

  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

  <p>
    <label for="title">Kirjan nimi</label><br>
    <input type="text" id="title" name="title" required>
  </p>

  <p>
    <label for="review">Arvostelu</label><br>
    <textarea id="review" name="review" rows="8" cols="60" required></textarea>
  </p>

  <p>
    Genret:<br>

    <label>
      <input type="checkbox" name="genres" value="fantasy">
      Fantasy
    </label><br>

    <label>
      <input type="checkbox" name="genres" value="scifi">
      Sci-fi
    </label><br>

    <label>
      <input type="checkbox" name="genres" value="romance">
      Romance
    </label><br>

    <label>
      <input type="checkbox" name="genres" value="horror">
      Horror
    </label><br>

    <label>
      <input type="checkbox" name="genres" value="mystery">
      Mystery
    </label><br>

  </p>

  <button type="submit">Julkaise arvostelu</button>

</form>

<p>
  <a href="/">Takaisin etusivulle</a>
</p>

{% endblock %}
