<!DOCTYPE html>
<html>
<head>
  <title>Muokkaa arvostelua</title>
</head>

<body>

<h1>Muokkaa arvostelua</h1>

<form method="POST" action="/update">

  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <input type="hidden" name="id" value="{{ review[0] }}">

  <p>
    Kirjan nimi:<br>
    <input type="text" name="title" value="{{ review[1] }}" required>
  </p>

  <p>
    Arvostelu:<br>
    <textarea name="review" rows="8" cols="60" required>{{ review[2] }}</textarea>
  </p>

  <p>
    Genret:<br>

    {% set current = genres %}

    <label>
      <input type="checkbox" name="genres" value="fantasy"
      {% if "fantasy" in current %}checked{% endif %}>
      Fantasy
    </label><br>

    <label>
      <input type="checkbox" name="genres" value="scifi"
      {% if "scifi" in current %}checked{% endif %}>
      Sci-fi
    </label><br>

    <label>
      <input type="checkbox" name="genres" value="romance"
      {% if "romance" in current %}checked{% endif %}>
      Romance
    </label><br>

    <label>
      <input type="checkbox" name="genres" value="horror"
      {% if "horror" in current %}checked{% endif %}>
      Horror
    </label><br>

    <label>
      <input type="checkbox" name="genres" value="mystery"
      {% if "mystery" in current %}checked{% endif %}>
      Mystery
    </label><br>

  </p>

  <button type="submit">Tallenna muutokset</button>

</form>

<p>
  <a href="/">Takaisin</a>
</p>

</body>
</html>
