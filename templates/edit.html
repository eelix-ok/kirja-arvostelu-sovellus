<!DOCTYPE html>
<html>

<head>
  <title>Muokkaa arvostelua</title>
</head>

<body>

  <h1>Muokkaa arvostelua</h1>

  <form action="/update" method="post">

    <!-- ID piilotettuna -->
    <input type="hidden" name="id" value="{{ review[0] }}">

    <p>
      Kirjan nimi:<br>
      <input type="text" name="title" value="{{ review[1] }}" required>
    </p>

    <p>
      Kuvaus:<br>
      <textarea name="description" rows="8" cols="60" required>{{ review[2] }}</textarea>
    </p>

    <p>
      Genre:<br>
      <input type="text" name="genre" value="{{ review[3] }}" required>
    </p>

    <button type="submit">Tallenna muutokset</button>

  </form>

  <p>
    <a href="/">← Takaisin etusivulle</a>
  </p>

</body>

</html>
